<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>신호 추락</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="게임 상태">
        <div>
          <span class="label">점수</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">공세</span>
          <strong id="wave">1</strong>
        </div>
        <div>
          <span class="label">내구도</span>
          <strong id="health">100%</strong>
        </div>
        <button id="pauseButton" type="button" title="일시정지">일시정지</button>
      </section>

      <canvas id="game" width="1280" height="720" aria-label="신호 추락 게임 화면"></canvas>

      <section class="panel" id="panel">
        <h1>신호 추락</h1>
        <p>드론을 부수고 신호 조각을 모아 붕괴를 버티세요.</p>
        <div class="wallet">보유 골드 <strong id="goldAmount">0</strong></div>
        <div class="meta-store" id="metaStore" aria-label="메인 업그레이드"></div>
        <button id="startButton" type="button">출격</button>
      </section>

      <section class="level-panel" id="levelPanel" hidden>
        <div class="level-copy">
          <span class="label">레벨 상승</span>
          <h2>강화 선택</h2>
        </div>
        <div class="upgrade-grid" id="upgradeGrid" aria-label="강화 선택지"></div>
      </section>

      <section class="stats-panel" id="statsPanel" hidden>
        <div class="level-copy">
          <span class="label">일시정지</span>
          <h2>현재 능력치</h2>
        </div>
        <div class="stats-grid" id="statsGrid" aria-label="현재 능력치"></div>
        <button id="resumeButton" type="button">계속하기</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
