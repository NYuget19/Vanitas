<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanitas Arcade - Portal</title>
    <style>
        /* 갈무리11 폰트 로드 */
        @font-face {
            font-family: 'Galmuri11';
            src: url('./fonts/Galmuri11.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Galmuri11', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #portal-container {
            text-align: center;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 5px;
            margin-bottom: 30px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 18px;
            color: #888;
            margin-bottom: 50px;
        }

        /* 간단한 로딩 애니메이션 */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #00d2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="portal-container">
        <h1>VANITAS ARCADE</h1>
        <p>게임에 접속하는 중...</p>
        <div class="loader"></div>
    </div>

    <script>
        // [기획 요구사항] 등록된 게임들 중 하나 랜덤으로 선택하여 실행
        // 새로운 게임이 생기면 이 리스트에 추가하면 됩니다.
        const games = [
            'run.html'
            // 'puzzle.html',
            // 'jump.html' 등 추가 가능
        ];

        function launchRandomGame() {
            // 랜덤 인덱스 선택
            const randomIndex = Math.floor(Math.random() * games.length);
            const selectedGame = games[randomIndex];
            
            // 약간의 연출용 딜레이 후 이동
            setTimeout(() => {
                window.location.href = selectedGame;
            }, 1200);
        }

        // 페이지 로드 시 실행
        window.onload = launchRandomGame;
    </script>
</body>
</html>
